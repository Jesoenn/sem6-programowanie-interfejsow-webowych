<!DOCTYPE html>
<html lang = "pl">
    <head>
        <meta charset = "utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sklep Plagro</title>
        <link rel = "stylesheet" href = "style.css"/>
    </head>
    <body>
        <header class="top-bar">
            <h1>Plagro</h1>
            <button class="top-bar-btn" onclick="window.location.href='index.html'">Powrót</button>
            <button class="top-bar-btn">Zaloguj się</button>
            <button class="top-bar-btn">Wyloguj się</button>
            <button class="top-bar-btn">Koszyk</button>
        </header>

        <main>
            <section class="newgame-card">
                <h2>Wprowadź nową pozycję</h2>
                <form>
                    <label for="newgame-name">Nazwa gry:</label>
                    <input type="text" id="newgame-name" class="filter-input" placeholder="Nazwa gry"/>

                    <label for="newgame-desc">Opis:</label>
                    <textarea id="newgame-desc" class="filter-input" placeholder="Wprowadź opis gry"></textarea>

                    <label for="newgame-genre">Gatunek: </label>
                    <select id="newgame-genre" class="filter-input">
                        <option>Wszystkie</option>
                        <option>Strategiczne</option>
                        <option>Przygodowe</option>
                        <option>Imprezowe</option>
                        <option>Logiczne</option>
                    </select>

                    <label for="newgame-players">Ilość graczy:</label>
                    <input type="number" id="newgame-players" class="filter-input" min="1">

                    <label for="newgame-publisher">Wydawnictwo:</label>
                    <input type="text" id="newgame-publisher" class="filter-input">

                    <label for="newgame-duration">Czas gry (min):</label>
                    <input type="number" id="newgame-duration" class="filter-input" min="0">

                    <label for="newgame-price">Cena (zł):</label>
                    <input type="number" id="newgame-price" class="filter-input" min="0", step="0.01">

                    <button class="newgame-btn">Utwórz pozycję</button>                
                </form>
            </section>
        </main>
    </body>
</html>
